function getDaySet() {
  const start = new Date("2026-04-30T00:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.floor((today - start) / 86400000);
  return Math.abs(diff) % WORD_BANK.length;
}

// ── 嚴格發音比對 ──
function strictMatch(heard, target) {
  const normalize = s => s.toLowerCase().replace(/[^a-z\s]/g, "").trim();
  const h = normalize(heard);
  const t = normalize(target);
  // 完全一致
  if (h === t) return true;
  // 目標詞是多字片語（如 hang out），任何一個字完全匹配且包含主要詞就算對
  const targetWords = t.split(" ");
  const heardWords = h.split(" ");
  if (targetWords.length > 1) {
    // 每個目標詞都要在聽到的詞裡出現
    return targetWords.every(tw => heardWords.some(hw => hw === tw));
  }
  // 單字：必須完全相同，允許差一個字母（應對口音）
  if (h === t) return true;
  if (Math.abs(h.length - t.length) > 2) return false;
  // 計算編輯距離
  let diff = 0;
  const shorter = h.length < t.length ? h : t;
  const longer = h.length < t.length ? t : h;
  for (let i = 0; i < shorter.length; i++) {
    if (shorter[i] !== longer[i]) diff++;
  }
  diff += longer.length - shorter.length;
  return diff <= 1;
}

function SpeakBtn({ text, label, accent, rate }) {
  const [playing, setPlaying] = useState(false);
  function handleSpeak() {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setPlaying(true);
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US"; utter.rate = rate || 0.85; utter.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en"));
    if (v) utter.voice = v;
    utter.onend = () => setPlaying(false);
    utter.onerror = () => setPlaying(false);
    window.speechSynthesis.speak(utter);
  }
  return (
    <button onClick={handleSpeak} style={{
      display:"inline-flex", alignItems:"center", gap:"5px",
      background: playing ? `${accent}33` : "rgba(255,255,255,0.08)",
      border:`1px solid ${playing ? accent : "rgba(255,255,255,0.15)"}`,
      color: playing ? accent : "rgba(255,255,255,0.6)",
      borderRadius:"20px", padding:"6px 14px", fontSize:"13px", cursor:"pointer",
      transition:"all 0.2s", WebkitTapHighlightColor:"transparent"
    }}>
      <span style={{fontSize:"15px"}}>{playing ? "🔊" : "🔈"}</span>{label}
    </button>
  );
}

function SpeechPractice({ word, accent }) {
  const [status, setStatus] = useState("idle");
  const [heard, setHeard] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const [attempts, setAttempts] = useState(0);
  const recRef = useRef(null);
  const gotResultRef = useRef(false);

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }
    if (recRef.current) { try { recRef.current.abort(); } catch(e) {} }
    setStatus("listening"); setHeard(""); setErrorMsg(""); gotResultRef.current = false;
    const rec = new SR();
    recRef.current = rec;
    rec.lang = "en-US"; rec.interimResults = false; rec.continuous = false; rec.maxAlternatives = 5;
    rec.onresult = (e) => {
      gotResultRef.current = true;
      const transcripts = [];
      for (let i = 0; i < e.results.length; i++)
        for (let j = 0; j < e.results[i].length; j++)
          transcripts.push(e.results[i][j].transcript);
      const best = transcripts[0] || "";
      setHeard(best);
      setAttempts(a => a + 1);
      const matched = transcripts.some(t => strictMatch(t, word));
      setStatus(matched ? "success" : "fail");
    };
    rec.onerror = (e) => {
      gotResultRef.current = true;
      if (e.error === "not-allowed") setErrorMsg("請允許麥克風權限後再試");
      else if (e.error === "no-speech") setErrorMsg("沒偵測到聲音，說大聲一點再試");
      else setErrorMsg("請再試一次");
      setStatus("error");
    };
    rec.onend = () => {
      if (!gotResultRef.current) { setErrorMsg("沒收到語音，靠近麥克風說清楚一點"); setStatus("error"); }
    };
    try { rec.start(); } catch(e) { setErrorMsg("無法啟動麥克風"); setStatus("error"); }
  }

  function reset() { setStatus("idle"); setHeard(""); setErrorMsg(""); gotResultRef.current = false; }

  if (status === "unsupported") return (
    <div style={{ padding:"14px", background:"rgba(255,100,100,0.08)", borderRadius:"12px", fontSize:"13px", color:"#f5a623", textAlign:"center", marginBottom:"14px" }}>
      ⚠️ 請用 <strong>Chrome 瀏覽器</strong> 開啟此頁面才能使用跟讀功能
    </div>
  );

  return (
    <div style={{ padding:"16px", background:"rgba(255,255,255,0.04)", borderRadius:"14px", marginBottom:"14px" }}>
      <div style={{ fontSize:"11px", letterSpacing:"2px", color:accent, textTransform:"uppercase", marginBottom:"12px" }}>
        🎤 跟讀練習 {attempts > 0 && <span style={{color:"#666"}}>（已練習 {attempts} 次）</span>}
      </div>
      <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.5)", marginBottom:"14px", lineHeight:"1.7" }}>
        ① 聽發音　② 模仿跟念　③ 按麥克風，AI 嚴格判斷
      </div>
      <div style={{ display:"flex", gap:"10px", alignItems:"center", flexWrap:"wrap" }}>
        <SpeakBtn text={word} label="① 聽發音" accent={accent} rate={0.65} />

        {status === "idle" && (
          <button onClick={startListening} style={{
            display:"inline-flex", alignItems:"center", gap:"7px",
            background:accent, border:"none", color:"#fff",
            borderRadius:"20px", padding:"7px 18px", fontSize:"13px",
            cursor:"pointer", fontWeight:"700", WebkitTapHighlightColor:"transparent"
          }}>🎤 ② 我來念</button>
        )}

        {status === "listening" && (
          <div style={{ display:"flex", alignItems:"center", gap:"10px", flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"6px", color:"#f5a623", fontSize:"13px" }}>
              <span style={{ animation:"pulse 0.6s infinite", fontSize:"18px" }}>🔴</span>
              聆聽中...
            </div>
            <button onClick={reset} style={{ background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)", color:"#888", borderRadius:"10px", padding:"5px 12px", fontSize:"12px", cursor:"pointer" }}>取消</button>
          </div>
        )}

        {status === "success" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"10px", flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"26px" }}>✅</span>
              <div>
                <div style={{ color:"#52b788", fontSize:"15px", fontWeight:"700" }}>發音正確！</div>
                {heard && <div style={{ fontSize:"11px", color:"#666", marginTop:"2px" }}>辨識到：「{heard}」</div>}
              </div>
            </div>
            <button onClick={reset} style={{ alignSelf:"flex-start", background:"rgba(82,183,136,0.15)", border:"1px solid rgba(82,183,136,0.4)", color:"#52b788", borderRadius:"12px", padding:"6px 16px", fontSize:"13px", cursor:"pointer" }}>再練一次</button>
          </div>
        )}

        {status === "fail" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"10px", flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"26px" }}>❌</span>
              <div>
                <div style={{ color:"#e94560", fontSize:"15px", fontWeight:"700" }}>發音不對，再試！</div>
                <div style={{ fontSize:"11px", color:"#666", marginTop:"2px", lineHeight:"1.6" }}>
                  {heard ? <>你說：「{heard}」<br/>目標：「{word}」</> : "沒清楚辨識到，靠近麥克風說清楚"}
                </div>
              </div>
            </div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              <button onClick={startListening} style={{ background:accent, border:"none", color:"#fff", borderRadius:"12px", padding:"7px 18px", fontSize:"13px", cursor:"pointer", fontWeight:"700" }}>🎤 再念一次</button>
              <SpeakBtn text={word} label="慢速聽" accent={accent} rate={0.5} />
            </div>
          </div>
        )}

        {status === "error" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"8px", flex:1 }}>

            <button onClick={startListening} style={{ alignSelf:"flex-start", background:`${accent}22`, border:`1px solid ${accent}55`, color:accent, borderRadius:"12px", padding:"6px 16px", fontSize:"13px", cursor:"pointer" }}>🎤 重試</button>
          </div>
        )}
      </div>
    </div>
  );
}

function QuizMode({ words }) {
  const [qIndex, setQIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [options, setOptions] = useState([]);

  useEffect(() => { generateOptions(0); }, []);

  function generateOptions(idx) {
    const correct = words[idx];
    const pool = [
      {word:"happy",chineseMeaning:"開心的"},{word:"tired",chineseMeaning:"累的"},
      {word:"go",chineseMeaning:"走"},{word:"eat",chineseMeaning:"吃"},
      {word:"cold",chineseMeaning:"冷的"},{word:"help",chineseMeaning:"幫忙"},
      {word:"now",chineseMeaning:"現在"},{word:"sorry",chineseMeaning:"抱歉"},
      {word:"good",chineseMeaning:"好的"},{word:"want",chineseMeaning:"想要"},
      {word:"late",chineseMeaning:"遲到的"},{word:"buy",chineseMeaning:"買"},
    ].filter(p => p.word !== correct.word);
    const others = pool.sort(() => Math.random() - 0.5).slice(0, 3);
    setOptions([...others, correct].sort(() => Math.random() - 0.5));
    setSelected(null);
  }

  function handleSelect(opt) {
    if (selected !== null) return;
    setSelected(opt);
    if (opt.word === words[qIndex].word) setScore(s => s + 1);
  }

  function next() {
    if (qIndex + 1 >= words.length) { setDone(true); return; }
    const ni = qIndex + 1; setQIndex(ni); generateOptions(ni);
  }

  function restart() { setQIndex(0); setScore(0); setDone(false); generateOptions(0); }

  const c = CARD_COLORS[qIndex % CARD_COLORS.length];
  const current = words[qIndex];

  if (done) return (
    <div style={{ textAlign:"center", padding:"40px 20px" }}>
      <div style={{ fontSize:"56px", marginBottom:"16px" }}>{score === words.length ? "🎉" : score >= 3 ? "👍" : "💪"}</div>
      <div style={{ fontSize:"30px", fontWeight:"700", color:"#fff", marginBottom:"8px" }}>{score} / {words.length}</div>
      <div style={{ fontSize:"14px", color:"#888", marginBottom:"28px" }}>{score === words.length ? "全對！太厲害了！" : score >= 3 ? "不錯！繼續加油！" : "再練一次！"}</div>
      <button onClick={restart} style={{ background:CARD_COLORS[0].accent, border:"none", color:"#fff", borderRadius:"14px", padding:"14px 36px", fontSize:"16px", cursor:"pointer", fontWeight:"700" }}>再玩一次</button>
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"16px" }}>
        <div style={{ fontSize:"13px", color:"#666" }}>第 {qIndex+1} / {words.length} 題</div>
        <div style={{ fontSize:"13px", color:"#52b788" }}>✓ {score} 分</div>
      </div>
      <div style={{ background:c.light, borderRadius:"16px", padding:"28px", textAlign:"center", marginBottom:"16px" }}>
        <div style={{ fontSize:"12px", color:c.accent, letterSpacing:"2px", textTransform:"uppercase", marginBottom:"10px" }}>看中文，選英文</div>
        <div style={{ fontSize:"30px", fontWeight:"700", color:"#fff" }}>{current.chineseMeaning}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"16px" }}>
        {options.map((opt, i) => {
          let bg = "rgba(255,255,255,0.06)", border = "1px solid rgba(255,255,255,0.1)", color = "#ccc";
          if (selected !== null) {
            if (opt.word === current.word) { bg = "rgba(82,183,136,0.2)"; border = "1px solid #52b788"; color = "#52b788"; }
            else if (opt.word === selected.word) { bg = "rgba(233,69,96,0.2)"; border = "1px solid #e94560"; color = "#e94560"; }
          }
          return (
            <button key={i} onClick={() => handleSelect(opt)} style={{ background:bg, border, color, borderRadius:"12px", padding:"16px 8px", fontSize:"14px", cursor: selected ? "default":"pointer", fontWeight:"600", transition:"all 0.2s" }}>
              {opt.word}
            </button>
          );
        })}
      </div>
      {selected && (
        <>
          <div style={{ padding:"12px", background:"rgba(255,255,255,0.04)", borderRadius:"10px", fontSize:"12px", color:"#888", fontStyle:"italic", textAlign:"center", marginBottom:"12px" }}>"{current.example1}"</div>
          <button onClick={next} style={{ width:"100%", background:c.accent, border:"none", color:"#fff", borderRadius:"12px", padding:"14px", fontSize:"15px", cursor:"pointer", fontWeight:"700" }}>
            {qIndex + 1 >= words.length ? "看成績 🎉" : "下一題 →"}
          </button>
        </>
      )}
    </div>
  );
}

function App() {
  const [mode, setMode] = useState("learn");
  const [active, setActive] = useState(0);
  const [revealed, setRevealed] = useState({});
  const [learned, setLearned] = useState({});

  const setIndex = getDaySet();
  const words = WORD_BANK[setIndex];
  const today = new Date().toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
  const learnedCount = Object.values(learned).filter(Boolean).length;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a0a0f 0%,#12121f 50%,#0a0a0f 100%)", fontFamily:"Georgia,serif", color:"#f0ede8" }}>
      <div style={{ padding:"24px 20px 14px", textAlign:"center", borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
        <div style={{ fontSize:"10px", letterSpacing:"4px", textTransform:"uppercase", color:"#888", marginBottom:"4px" }}>Daily Vocabulary</div>
        <h1 style={{ margin:"0 0 3px", fontSize:"24px", fontWeight:"300", letterSpacing:"2px" }}>每日英文單字</h1>
        <div style={{ fontSize:"11px", color:"#555", marginBottom:"3px" }}>{today}</div>
        <div style={{ fontSize:"11px", color:"#666" }}>今日主題：<span style={{ color:"#f5a623" }}>{GROUP_LABELS[setIndex]}</span></div>
        <div style={{ fontSize:"10px", color:"#444", marginTop:"2px" }}>75個單字 · 第{setIndex+1}/15組 · 每天5個</div>
        {learnedCount > 0 && mode === "learn" && (
          <div style={{ marginTop:"8px", display:"inline-block", background:"rgba(82,183,136,0.15)", border:"1px solid rgba(82,183,136,0.3)", borderRadius:"20px", padding:"4px 16px", fontSize:"12px", color:"#52b788" }}>
            今日已學 {learnedCount} / {words.length} 個 🎉
          </div>
        )}
      </div>

      <div style={{ display:"flex", justifyContent:"center", gap:"10px", padding:"14px 20px 0" }}>
        {[["learn","📖 學習"],["quiz","🧠 測驗"]].map(([m, label]) => (
          <button key={m} onClick={() => setMode(m)} style={{
            padding:"10px 28px", borderRadius:"20px", border:"none",
            background: mode === m ? "#f5a623" : "rgba(255,255,255,0.08)",
            color: mode === m ? "#000" : "#999",
            fontSize:"14px", cursor:"pointer", fontWeight: mode === m ? "700":"400",
            WebkitTapHighlightColor:"transparent"
          }}>{label}</button>
        ))}
      </div>

      <div style={{ maxWidth:"460px", margin:"0 auto", padding:"16px 14px 40px" }}>
        {mode === "quiz" && <QuizMode words={words} />}

        {mode === "learn" && (
          <>
            <div style={{ display:"flex", gap:"6px", marginBottom:"18px", overflowX:"auto", paddingBottom:"6px" }}>
              {words.map((w, i) => (
                <button key={i} onClick={() => setActive(i)} style={{
                  flexShrink:0, padding:"8px 14px", borderRadius:"20px", border:"none",
                  background: active === i ? CARD_COLORS[i % CARD_COLORS.length].accent : "rgba(255,255,255,0.07)",
                  color: active === i ? "#fff" : "#999", fontSize:"12px", cursor:"pointer",
                  fontWeight: active === i ? "700":"400", position:"relative",
                  WebkitTapHighlightColor:"transparent"
                }}>
                  {learned[i] && <span style={{ position:"absolute", top:"-4px", right:"-2px", fontSize:"10px" }}>✓</span>}
                  {i+1}. {w.word}
                </button>
              ))}
            </div>

            {words.map((word, i) => {
              if (active !== i) return null;
              const c = CARD_COLORS[i % CARD_COLORS.length];
              return (
                <div key={i} style={{ background:c.bg, borderRadius:"22px", overflow:"hidden", boxShadow:"0 24px 60px rgba(0,0,0,0.5)", animation:"fadeIn 0.3s ease" }}>
                  <div style={{ height:"4px", background:c.accent }} />

                  {/* Hero */}
                  <div style={{ padding:"28px 24px 20px", background:c.light, textAlign:"center" }}>
                    <div style={{ fontSize:"11px", letterSpacing:"3px", color:c.accent, textTransform:"uppercase", marginBottom:"6px" }}>{word.partOfSpeech}</div>
                    <div style={{ fontSize:"36px", fontWeight:"700", color:"#fff", marginBottom:"6px" }}>{word.word}</div>
                    <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.4)", marginBottom:"14px" }}>{word.pronunciation}</div>
                    <div style={{ display:"inline-block", background:`${c.accent}22`, border:`1px solid ${c.accent}44`, borderRadius:"10px", padding:"8px 20px", fontSize:"17px", color:c.accent, fontWeight:"600" }}>
                      {word.chineseMeaning}
                    </div>
                  </div>

                  <div style={{ padding:"18px 22px 0" }}>
                    {/* 跟讀 */}
                    <SpeechPractice word={word.word} accent={c.accent} />

                    {/* 例句 */}
                    <div style={{ marginBottom:"12px", padding:"16px", background:"rgba(255,255,255,0.04)", borderRadius:"14px", borderLeft:`3px solid ${c.accent}` }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
                        <div style={{ fontSize:"11px", letterSpacing:"2px", color:"#666", textTransform:"uppercase" }}>例句 × 2</div>
                        <SpeakBtn text={word.example1} label="聽例句1" accent={c.accent} rate={0.82} />
                      </div>

                      {/* 例句1 */}
                      <div style={{ marginBottom:"14px" }}>
                        <div style={{ fontSize:"15px", color:"#e8e4de", lineHeight:"1.7", fontStyle:"italic", marginBottom:"6px" }}>
                          "{ word.example1 }"
                        </div>
                        <div style={{ fontSize:"12px", color:"#777" }}>{word.example1Translation}</div>
                      </div>

                      {/* 例句2 */}
                      <div style={{ borderTop:"1px solid rgba(255,255,255,0.06)", paddingTop:"12px" }}>
                        <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:"8px" }}>
                          <SpeakBtn text={word.example2} label="聽例句2" accent={c.accent} rate={0.82} />
                        </div>
                        <div style={{ fontSize:"15px", color:"#e8e4de", lineHeight:"1.7", fontStyle:"italic", marginBottom:"6px" }}>
                          "{ word.example2 }"
                        </div>
                        {revealed[i]
                          ? <div style={{ fontSize:"12px", color:"#777" }}>{word.example2Translation}</div>
                          : <button onClick={() => setRevealed(r => ({...r,[i]:true}))} style={{ background:"none", border:"1px solid rgba(255,255,255,0.12)", color:"#888", borderRadius:"8px", padding:"5px 14px", fontSize:"12px", cursor:"pointer" }}>顯示中文翻譯</button>
                        }
                      </div>
                    </div>

                    {/* 小技巧 */}
                    <div style={{ padding:"14px", background:`${c.accent}11`, borderRadius:"12px", border:`1px solid ${c.accent}22`, marginBottom:"14px" }}>
                      <div style={{ fontSize:"11px", letterSpacing:"2px", color:c.accent, textTransform:"uppercase", marginBottom:"6px" }}>💡 記憶小技巧</div>
                      <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.65)", lineHeight:"1.6" }}>{word.tip}</div>
                    </div>

                    <button onClick={() => setLearned(l => ({...l,[i]:!l[i]}))} style={{
                      width:"100%", padding:"13px",
                      background: learned[i] ? `${c.accent}33` : "rgba(255,255,255,0.05)",
                      border:`1px solid ${learned[i] ? c.accent : "rgba(255,255,255,0.1)"}`,
                      color: learned[i] ? c.accent : "#666",
                      borderRadius:"12px", fontSize:"14px", cursor:"pointer",
                      fontWeight: learned[i] ? "700":"400", marginBottom:"4px",
                      WebkitTapHighlightColor:"transparent"
                    }}>{learned[i] ? "✓ 學會了！" : "標記為已學會"}</button>
                  </div>

                  {/* Nav */}
                  <div style={{ padding:"14px 22px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <button onClick={() => setActive(Math.max(0,i-1))} disabled={i===0} style={{ background:"rgba(255,255,255,0.07)", border:"none", color:i===0?"#444":"#ccc", borderRadius:"10px", padding:"10px 20px", cursor:i===0?"default":"pointer", fontSize:"13px", WebkitTapHighlightColor:"transparent" }}>← 上一個</button>
                    <div style={{ fontSize:"12px", color:"#555" }}>{i+1} / {words.length}</div>
                    <button onClick={() => setActive(Math.min(words.length-1,i+1))} disabled={i===words.length-1} style={{ background:i===words.length-1?"rgba(255,255,255,0.03)":c.accent, border:"none", color:i===words.length-1?"#444":"#fff", borderRadius:"10px", padding:"10px 20px", cursor:i===words.length-1?"default":"pointer", fontSize:"13px", fontWeight:"700", WebkitTapHighlightColor:"transparent" }}>下一個 →</button>
                  </div>
                </div>
              );
            })}
          </>
        )}
        <div style={{ textAlign:"center", marginTop:"20px", fontSize:"11px", color:"#333" }}>
          75個單字 · 15組主題 · 每天5個 · 自動換新
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
