<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日英文練習</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #0a0a0f; font-family: Georgia, serif; color: #f0ede8; min-height: 100vh; }
button { font-family: inherit; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes flame { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.15) rotate(3deg)} }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes celebrate { 0%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.2)} 100%{transform:translateY(0) scale(1)} }
@keyframes levelUp { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const TOPICS = [
  { id: "daily", label: "日常生活", emoji: "🏠", desc: "吃飯、購物、交通、家居" },
  { id: "travel", label: "旅遊出行", emoji: "✈️", desc: "機場、飯店、問路、景點" },
  { id: "work", label: "職場英文", emoji: "💼", desc: "開會、email、簡報、同事" },
  { id: "social", label: "社交聊天", emoji: "💬", desc: "朋友、約會、聚會、閒聊" },
  { id: "drama", label: "追劇口語", emoji: "🎬", desc: "影集、電影常見片語" },
  { id: "food", label: "飲食文化", emoji: "🍜", desc: "餐廳、點餐、食物描述" },
  { id: "health", label: "健康生活", emoji: "💪", desc: "運動、飲食、身體狀況" },
  { id: "shopping", label: "購物消費", emoji: "🛍️", desc: "砍價、比較、付款" },
];

const LEVELS = [
  { id: "beginner", label: "初學者", emoji: "🌱", minWords: 0, desc: "超基礎日常單字" },
  { id: "elementary", label: "初級", emoji: "🌿", minWords: 300, desc: "常用片語" },
  { id: "intermediate", label: "中級", emoji: "🌳", minWords: 500, desc: "口語表達" },
  { id: "advanced", label: "高級", emoji: "🏆", minWords: 1000, desc: "地道慣用語" },
];

const STORAGE_KEY = "daily_english_v3";

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
}
function getToday() { return new Date().toISOString().slice(0, 10); }

function getCurrentLevel(totalWords) {
  return LEVELS.slice().reverse().find(l => totalWords >= l.minWords) || LEVELS[0];
}
function getNextLevel(totalWords) {
  return LEVELS.find(l => l.minWords > totalWords) || null;
}

async function fetchWords(topic, level, count = 8) {
  const res = await fetch("/api/words", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ topic, level, count })
  });
  const data = await res.json();
  if (!data.words) throw new Error(data.error || "No words");
  return data.words;
}

function strictMatch(heard, target) {
  const norm = s => s.toLowerCase().replace(/[^a-z\s]/g, "").trim();
  const h = norm(heard), t = norm(target);
  if (h === t) return true;
  const tw = t.split(" "), hw = h.split(" ");
  if (tw.length > 1) return tw.every(tw => hw.some(hw => hw === tw));
  if (Math.abs(h.length - t.length) > 2) return false;
  let diff = 0;
  const s = h.length < t.length ? h : t, l = h.length < t.length ? t : h;
  for (let i = 0; i < s.length; i++) if (s[i] !== l[i]) diff++;
  return (diff + l.length - s.length) <= 1;
}

function SpeakBtn({ text, label, accent, rate }) {
  const [playing, setPlaying] = useState(false);
  function speak() {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel(); setPlaying(true);
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = rate || 0.85;
    const v = window.speechSynthesis.getVoices();
    const ev = v.find(v => v.lang === "en-US") || v.find(v => v.lang.startsWith("en"));
    if (ev) u.voice = ev;
    u.onend = () => setPlaying(false); u.onerror = () => setPlaying(false);
    window.speechSynthesis.speak(u);
  }
  return (
    <button onClick={speak} style={{ display:"inline-flex", alignItems:"center", gap:"5px", background: playing ? `${accent}33` : "rgba(255,255,255,0.08)", border:`1px solid ${playing ? accent : "rgba(255,255,255,0.15)"}`, color: playing ? accent : "rgba(255,255,255,0.6)", borderRadius:"20px", padding:"6px 14px", fontSize:"13px", cursor:"pointer" }}>
      {playing ? "🔊" : "🔈"} {label}
    </button>
  );
}

function SpeechPractice({ word, accent, onPass }) {
  const [status, setStatus] = useState("idle");
  const [heard, setHeard] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const recRef = useRef(null);
  const gotRef = useRef(false);

  function startListen() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }
    if (recRef.current) { try { recRef.current.abort(); } catch(e) {} }
    setStatus("listening"); setHeard(""); setErrorMsg(""); gotRef.current = false;
    const rec = new SR();
    recRef.current = rec;
    rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 5;
    rec.onresult = (e) => {
      gotRef.current = true;
      const ts = [];
      for (let i = 0; i < e.results.length; i++)
        for (let j = 0; j < e.results[i].length; j++) ts.push(e.results[i][j].transcript);
      setHeard(ts[0] || "");
      const ok = ts.some(t => strictMatch(t, word));
      setStatus(ok ? "success" : "fail");
      if (ok && onPass) onPass();
    };
    rec.onerror = (e) => {
      gotRef.current = true;
      if (e.error === "not-allowed") setErrorMsg("請允許麥克風權限");
      else if (e.error === "no-speech") setErrorMsg("沒偵測到聲音，說大聲一點");
      else setErrorMsg("請再試一次");
      setStatus("error");
    };
    rec.onend = () => { if (!gotRef.current) { setErrorMsg("沒收到語音，靠近麥克風"); setStatus("error"); } };
    try { rec.start(); } catch(e) { setErrorMsg("無法啟動麥克風"); setStatus("error"); }
  }

  function reset() { setStatus("idle"); setHeard(""); setErrorMsg(""); gotRef.current = false; }

  if (status === "unsupported") return (
    <div style={{ padding:"12px", background:"rgba(255,100,100,0.08)", borderRadius:"10px", fontSize:"12px", color:"#f5a623", textAlign:"center", marginBottom:"14px" }}>
      ⚠️ 請用 <strong>Chrome 瀏覽器</strong> 才能使用跟讀功能
    </div>
  );

  return (
    <div style={{ padding:"16px", background:"rgba(255,255,255,0.04)", borderRadius:"14px", marginBottom:"14px" }}>
      <div style={{ fontSize:"11px", letterSpacing:"2px", color:accent, textTransform:"uppercase", marginBottom:"10px" }}>🎤 跟讀練習</div>
      <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.45)", marginBottom:"14px" }}>① 聽發音　② 跟著念　③ 按麥克風讓 AI 判斷</div>
      <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
        <SpeakBtn text={word} label="① 聽發音" accent={accent} rate={0.65} />
        {status === "idle" && (
          <button onClick={startListen} style={{ display:"inline-flex", alignItems:"center", gap:"6px", background:accent, border:"none", color:"#fff", borderRadius:"20px", padding:"7px 18px", fontSize:"13px", cursor:"pointer", fontWeight:"700" }}>🎤 ② 我來念</button>
        )}
        {status === "listening" && (
          <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
            <span style={{ color:"#f5a623", animation:"pulse 0.6s infinite" }}>🔴 聆聽中...</span>
            <button onClick={reset} style={{ background:"rgba(255,255,255,0.08)", border:"none", color:"#777", borderRadius:"10px", padding:"5px 12px", fontSize:"12px", cursor:"pointer" }}>取消</button>
          </div>
        )}
        {status === "success" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"8px", flex:1, animation:"pop 0.3s ease" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"26px" }}>✅</span>
              <div>
                <div style={{ color:"#52b788", fontSize:"15px", fontWeight:"700" }}>發音正確！</div>
                {heard && <div style={{ fontSize:"11px", color:"#555", marginTop:"2px" }}>辨識：「{heard}」</div>}
              </div>
            </div>
          </div>
        )}
        {status === "fail" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"10px", flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"26px" }}>❌</span>
              <div>
                <div style={{ color:"#e94560", fontSize:"15px", fontWeight:"700" }}>再試一次！</div>
                <div style={{ fontSize:"11px", color:"#555", marginTop:"2px", lineHeight:"1.6" }}>
                  {heard ? <>你說：「{heard}」<br/>目標：「{word}」</> : "靠近麥克風說清楚一點"}
                </div>
              </div>
            </div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              <button onClick={startListen} style={{ background:accent, border:"none", color:"#fff", borderRadius:"12px", padding:"7px 18px", fontSize:"13px", cursor:"pointer", fontWeight:"700" }}>🎤 再念一次</button>
              <SpeakBtn text={word} label="慢速聽" accent={accent} rate={0.5} />
            </div>
          </div>
        )}
        {status === "error" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"8px", flex:1 }}>
            <div style={{ fontSize:"13px", color:"#f5a623" }}>⚠️ {errorMsg}</div>
            <button onClick={startListen} style={{ alignSelf:"flex-start", background:`${accent}22`, border:`1px solid ${accent}55`, color:accent, borderRadius:"12px", padding:"6px 16px", fontSize:"13px", cursor:"pointer" }}>🎤 重試</button>
          </div>
        )}
      </div>
    </div>
  );
}

const CARD_COLORS = [
  { bg: "#1a1a2e", accent: "#e94560", light: "#16213e" },
  { bg: "#0f3460", accent: "#f5a623", light: "#1a4a7a" },
  { bg: "#1b4332", accent: "#52b788", light: "#2d6a4f" },
  { bg: "#3d0c02", accent: "#ff6b35", light: "#5c1a10" },
  { bg: "#240046", accent: "#c77dff", light: "#3c096c" },
];

function SetupScreen({ onComplete }) {
  const [step, setStep] = useState(1);
  const [topic, setTopic] = useState(null);

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a0a0f,#12121f)", padding:"32px 20px", maxWidth:"440px", margin:"0 auto" }}>
      <div style={{ textAlign:"center", marginBottom:"28px" }}>
        <div style={{ fontSize:"36px", marginBottom:"12px" }}>📚</div>
        <h1 style={{ fontSize:"22px", fontWeight:"300", letterSpacing:"2px", marginBottom:"6px" }}>歡迎使用每日英文</h1>
        <p style={{ fontSize:"13px", color:"#666" }}>選擇你的學習主題，AI 每次幫你生成新單字</p>
      </div>
      <div style={{ fontSize:"14px", color:"#f5a623", marginBottom:"16px", textAlign:"center" }}>選擇學習主題</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"24px" }}>
        {TOPICS.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{ padding:"16px 12px", borderRadius:"14px", border:`2px solid ${topic === t.id ? "#f5a623" : "rgba(255,255,255,0.08)"}`, background: topic === t.id ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", color: topic === t.id ? "#f5a623" : "#ccc", cursor:"pointer", textAlign:"left" }}>
            <div style={{ fontSize:"22px", marginBottom:"6px" }}>{t.emoji}</div>
            <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"3px" }}>{t.label}</div>
            <div style={{ fontSize:"11px", color:"#666" }}>{t.desc}</div>
          </button>
        ))}
      </div>
      <button onClick={() => topic && onComplete(topic)} style={{ width:"100%", padding:"14px", background: topic ? "#f5a623" : "rgba(255,255,255,0.06)", border:"none", color: topic ? "#000" : "#555", borderRadius:"12px", fontSize:"15px", cursor: topic ? "pointer":"default", fontWeight:"700" }}>
        開始學習 🚀
      </button>
    </div>
  );
}

function LevelUpModal({ level, onClose }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:200, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"20px" }}>
      <div style={{ animation:"levelUp 0.5s ease", textAlign:"center" }}>
        <div style={{ fontSize:"80px", marginBottom:"16px" }}>{level.emoji}</div>
        <div style={{ fontSize:"14px", letterSpacing:"4px", textTransform:"uppercase", color:"#f5a623", marginBottom:"8px" }}>Level Up!</div>
        <div style={{ fontSize:"32px", fontWeight:"700", color:"#fff", marginBottom:"8px" }}>{level.label}</div>
        <div style={{ fontSize:"15px", color:"#888", marginBottom:"28px" }}>{level.desc}</div>
        <button onClick={onClose} style={{ background:"#f5a623", border:"none", color:"#000", borderRadius:"14px", padding:"14px 36px", fontSize:"16px", cursor:"pointer", fontWeight:"700" }}>繼續練習！</button>
      </div>
    </div>
  );
}

function App() {
  const [appData, setAppData] = useState(null);
  const [screen, setScreen] = useState("init");
  const [wordQueue, setWordQueue] = useState([]);
  const [currentWord, setCurrentWord] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [speechPassed, setSpeechPassed] = useState(false);
  const [todayCount, setTodayCount] = useState(0);
  const [showStreak, setShowStreak] = useState(false);
  const [showLevelUp, setShowLevelUp] = useState(null);
  const [colorIdx, setColorIdx] = useState(0);

  useEffect(() => {
    const data = loadData();
    if (!data || !data.topic) {
      setScreen("setup");
    } else {
      setAppData(data);
      // 打卡
      const today = getToday();
      if (data.lastCheckin !== today) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0, 10);
        const newStreak = data.lastCheckin === yStr ? (data.streak || 0) + 1 : 1;
        const updated = { ...data, lastCheckin: today, streak: newStreak };
        setAppData(updated);
        saveData(updated);
        if (newStreak > (data.streak || 0)) {
          setShowStreak(true);
          setTimeout(() => setShowStreak(false), 2500);
        }
      }
      const todayKey = `today_${today}`;
      setTodayCount(data[todayKey] || 0);
      setScreen("main");
      loadMoreWords(data);
    }
  }, []);

  async function loadMoreWords(data) {
    setLoading(true); setLoadError(null);
    try {
      const level = getCurrentLevel(data.totalWords || 0);
      const words = await fetchWords(data.topic, level.id, 8);
      setWordQueue(prev => {
        const queue = [...prev, ...words];
        if (!currentWord && queue.length > 0) {
          setCurrentWord(queue[0]);
          return queue.slice(1);
        }
        return queue;
      });
      if (!currentWord && words.length > 0) {
        setCurrentWord(words[0]);
        setWordQueue(words.slice(1));
      }
    } catch(e) {
      setLoadError("無法生成單字，請稍後再試");
    } finally {
      setLoading(false);
    }
  }

  function handleNext() {
    const data = appData;
    const today = getToday();
    const todayKey = `today_${today}`;
    const newTodayCount = (data[todayKey] || 0) + 1;
    const newTotal = (data.totalWords || 0) + 1;

    // 檢查升級
    const oldLevel = getCurrentLevel(data.totalWords || 0);
    const newLevel = getCurrentLevel(newTotal);
    const leveledUp = newLevel.id !== oldLevel.id;

    const updated = { ...data, totalWords: newTotal, [todayKey]: newTodayCount };
    setAppData(updated);
    saveData(updated);
    setTodayCount(newTodayCount);

    if (leveledUp) {
      setShowLevelUp(newLevel);
    }

    // 下一個單字
    setRevealed(false);
    setSpeechPassed(false);
    setColorIdx(i => (i + 1) % CARD_COLORS.length);

    if (wordQueue.length > 0) {
      setCurrentWord(wordQueue[0]);
      setWordQueue(prev => prev.slice(1));
    } else {
      setCurrentWord(null);
      loadMoreWords(updated);
    }

    // 如果 queue 快空了，預先載入
    if (wordQueue.length <= 2) {
      loadMoreWords(updated);
    }
  }

  function handleSetup(topic) {
    const newData = { topic, totalWords: 0, streak: 0, lastCheckin: getToday(), createdAt: getToday() };
    setAppData(newData);
    saveData(newData);
    setScreen("main");
    loadMoreWords(newData);
  }

  if (screen === "setup") return <SetupScreen onComplete={handleSetup} />;

  const data = appData;
  const currentLevel = getCurrentLevel(data?.totalWords || 0);
  const nextLevel = getNextLevel(data?.totalWords || 0);
  const topicInfo = TOPICS.find(t => t.id === data?.topic);
  const c = CARD_COLORS[colorIdx];
  const today = new Date().toLocaleDateString("zh-TW", { month:"long", day:"numeric", weekday:"long" });

  // 升級到下一級還需要多少個
  const wordsToNext = nextLevel ? nextLevel.minWords - (data?.totalWords || 0) : null;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a0a0f 0%,#12121f 50%,#0a0a0f 100%)" }}>
      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes flame{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.15) rotate(3deg)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pop{0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
        @keyframes celebrate{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.2)}100%{transform:translateY(0) scale(1)}}
        @keyframes levelUp{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
      `}</style>

      {showLevelUp && <LevelUpModal level={showLevelUp} onClose={() => setShowLevelUp(null)} />}

      {showStreak && (
        <div style={{ position:"fixed", top:"20px", left:"50%", transform:"translateX(-50%)", zIndex:100, background:"rgba(255,107,0,0.95)", borderRadius:"20px", padding:"10px 24px", display:"flex", alignItems:"center", gap:"8px", animation:"pop 0.3s ease" }}>
          <span style={{ fontSize:"20px", animation:"flame 1s infinite" }}>🔥</span>
          <span style={{ fontSize:"15px", fontWeight:"700", color:"#fff" }}>連續 {data?.streak} 天！</span>
        </div>
      )}

      {/* Header */}
      <div style={{ padding:"16px 20px 12px", borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
          <div>
            <div style={{ fontSize:"10px", letterSpacing:"3px", textTransform:"uppercase", color:"#555", marginBottom:"2px" }}>English Practice</div>
            <div style={{ fontSize:"12px", color:"#777" }}>{today}</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
            {/* Streak */}
            <div style={{ display:"inline-flex", alignItems:"center", gap:"4px", background:"rgba(255,107,0,0.12)", border:"1px solid rgba(255,107,0,0.25)", borderRadius:"16px", padding:"4px 12px" }}>
              <span style={{ fontSize:"16px", animation: (data?.streak||0) > 0 ? "flame 1.5s infinite" : "none" }}>🔥</span>
              <span style={{ fontSize:"14px", fontWeight:"700", color:"#ff6b35" }}>{data?.streak || 0}</span>
            </div>
          </div>
        </div>

        {/* 等級 + 進度 */}
        <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"10px" }}>
          <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:"16px", padding:"4px 12px", fontSize:"12px", color:"#ccc" }}>
            {currentLevel.emoji} {currentLevel.label}
          </div>
          <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:"16px", padding:"4px 12px", fontSize:"12px", color:"#ccc" }}>
            {topicInfo?.emoji} {topicInfo?.label}
          </div>
        </div>

        {/* 統計 */}
        <div style={{ display:"flex", gap:"16px" }}>
          <div style={{ fontSize:"12px", color:"#666" }}>
            今日 <span style={{ color:"#f5a623", fontWeight:"700" }}>{todayCount}</span> 個
          </div>
          <div style={{ fontSize:"12px", color:"#666" }}>
            累積 <span style={{ color:"#c77dff", fontWeight:"700" }}>{data?.totalWords || 0}</span> 個
          </div>
          {nextLevel && (
            <div style={{ fontSize:"12px", color:"#666" }}>
              升級還差 <span style={{ color:"#52b788", fontWeight:"700" }}>{wordsToNext}</span> 個
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth:"460px", margin:"0 auto", padding:"16px 14px 48px" }}>

        {/* 載入中 */}
        {!currentWord && loading && (
          <div style={{ textAlign:"center", padding:"60px 20px" }}>
            <div style={{ width:"40px", height:"40px", border:"3px solid rgba(255,255,255,0.1)", borderTop:"3px solid #f5a623", borderRadius:"50%", animation:"spin 1s linear infinite", margin:"0 auto 16px" }} />
            <div style={{ fontSize:"14px", color:"#666" }}>AI 正在準備新單字...</div>
          </div>
        )}

        {/* 錯誤 */}
        {loadError && !currentWord && (
          <div style={{ textAlign:"center", padding:"40px 20px" }}>
            <div style={{ fontSize:"48px", marginBottom:"12px" }}>😵</div>
            <div style={{ fontSize:"14px", color:"#e94560", marginBottom:"20px" }}>{loadError}</div>
            <button onClick={() => loadMoreWords(data)} style={{ background:"#e94560", border:"none", color:"#fff", borderRadius:"12px", padding:"12px 28px", fontSize:"14px", cursor:"pointer", fontWeight:"700" }}>重新載入</button>
          </div>
        )}

        {/* 單字卡 */}
        {currentWord && (
          <div key={currentWord.word} style={{ background:c.bg, borderRadius:"22px", overflow:"hidden", boxShadow:"0 24px 60px rgba(0,0,0,0.5)", animation:"fadeIn 0.3s ease" }}>
            <div style={{ height:"4px", background:c.accent }} />

            {/* Hero */}
            <div style={{ padding:"28px 24px 20px", background:c.light, textAlign:"center" }}>
              <div style={{ fontSize:"11px", letterSpacing:"3px", color:c.accent, textTransform:"uppercase", marginBottom:"6px" }}>{currentWord.partOfSpeech}</div>
              <div style={{ fontSize:"38px", fontWeight:"700", color:"#fff", marginBottom:"8px" }}>{currentWord.word}</div>
              <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.4)", marginBottom:"14px" }}>{currentWord.pronunciation}</div>
              <div style={{ display:"inline-block", background:`${c.accent}22`, border:`1px solid ${c.accent}44`, borderRadius:"10px", padding:"8px 20px", fontSize:"17px", color:c.accent, fontWeight:"600" }}>
                {currentWord.chineseMeaning}
              </div>
            </div>

            <div style={{ padding:"18px 22px 0" }}>
              {/* 跟讀 */}
              <SpeechPractice word={currentWord.word} accent={c.accent} onPass={() => setSpeechPassed(true)} />

              {/* 例句 */}
              <div style={{ marginBottom:"12px", padding:"16px", background:"rgba(255,255,255,0.04)", borderRadius:"14px", borderLeft:`3px solid ${c.accent}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
                  <div style={{ fontSize:"11px", letterSpacing:"2px", color:"#555", textTransform:"uppercase" }}>例句 × 2</div>
                  <SpeakBtn text={currentWord.example1} label="聽例句1" accent={c.accent} rate={0.82} />
                </div>
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ fontSize:"14px", color:"#e8e4de", lineHeight:"1.7", fontStyle:"italic", marginBottom:"5px" }}>"{currentWord.example1}"</div>
                  <div style={{ fontSize:"12px", color:"#666" }}>{currentWord.example1Translation}</div>
                </div>
                <div style={{ borderTop:"1px solid rgba(255,255,255,0.06)", paddingTop:"12px" }}>
                  <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:"8px" }}>
                    <SpeakBtn text={currentWord.example2} label="聽例句2" accent={c.accent} rate={0.82} />
                  </div>
                  <div style={{ fontSize:"14px", color:"#e8e4de", lineHeight:"1.7", fontStyle:"italic", marginBottom:"5px" }}>"{currentWord.example2}"</div>
                  {revealed
                    ? <div style={{ fontSize:"12px", color:"#666" }}>{currentWord.example2Translation}</div>
                    : <button onClick={() => setRevealed(true)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"#777", borderRadius:"8px", padding:"5px 14px", fontSize:"12px", cursor:"pointer" }}>顯示中文翻譯</button>
                  }
                </div>
              </div>

              {/* 小技巧 */}
              <div style={{ padding:"14px", background:`${c.accent}11`, borderRadius:"12px", border:`1px solid ${c.accent}22`, marginBottom:"16px" }}>
                <div style={{ fontSize:"11px", letterSpacing:"2px", color:c.accent, textTransform:"uppercase", marginBottom:"6px" }}>💡 記憶小技巧</div>
                <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.65)", lineHeight:"1.6" }}>{currentWord.tip}</div>
              </div>

              {/* 下一個按鈕 */}
              <button onClick={handleNext} style={{ width:"100%", padding:"15px", background: c.accent, border:"none", color:"#fff", borderRadius:"14px", fontSize:"16px", cursor:"pointer", fontWeight:"700", marginBottom:"4px", display:"flex", alignItems:"center", justifyContent:"center", gap:"8px" }}>
                {speechPassed ? "✅ 發音通過！下一個 →" : "學會了，下一個 →"}
              </button>
              <div style={{ textAlign:"center", fontSize:"11px", color:"#444", padding:"6px" }}>
                看完就算學會，也可以先通過發音再繼續
              </div>
            </div>

            <div style={{ height:"20px" }} />
          </div>
        )}

        {/* 底部設定 */}
        <div style={{ textAlign:"center", marginTop:"24px" }}>
          <button onClick={() => { if(confirm("重新設定主題？")) { localStorage.removeItem(STORAGE_KEY); window.location.reload(); }}} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", color:"#555", borderRadius:"20px", padding:"7px 18px", fontSize:"12px", cursor:"pointer" }}>
            ⚙️ 更改主題
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
